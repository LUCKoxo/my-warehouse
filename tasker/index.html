<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="任务提醒">
<meta name="theme-color" content="#0D1117">
<meta name="description" content="任务提醒——循环督促直到完成">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%230D1117'/><text x='90' y='115' font-size='90' text-anchor='middle'>⏰</text></svg>">
<link rel="manifest" id="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIuS7u+WKoeaPkOmGuiIsCiAgInNob3J0X25hbWUiOiAi5Lu75YqhIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJzY29wZSI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMEQxMTE3IiwKICAidGhlbWVfY29sb3IiOiAiIzBEMTExNyIsCiAgImljb25zIjogW10KfQ==">
<title>任务提醒</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#0D1117;color:#E6EDF3;display:flex;justify-content:center;
}
#app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;position:relative;background:#0D1117}

/* Header */
header{
  background:#161B22;color:#E6EDF3;padding:14px 18px;
  padding-top:max(14px,env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  border-bottom:1px solid #21262D;
}
header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
header .btn-settings{
  background:none;border:none;color:#8B949E;font-size:22px;cursor:pointer;padding:4px 8px;
}
header .btn-settings:active{color:#E6EDF3}

/* Stats */
.stats-bar{display:flex;background:#161B22;border-bottom:1px solid #21262D;flex-shrink:0}
.stats-bar .stat{flex:1;text-align:center;padding:10px 6px}
.stat .num{font-size:22px;font-weight:800;color:#58A6FF;line-height:1.1}
.stat .num.done{color:#3FB950}
.stat .label{font-size:10px;color:#8B949E;margin-top:2px}

/* Mode indicator */
.mode-bar{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:6px;background:#161B22;font-size:11px;color:#8B949E;flex-shrink:0;
  border-bottom:1px solid #21262D;
}
.mode-bar .dot{width:6px;height:6px;border-radius:50%}
.mode-bar .dot.seq{background:#58A6FF}
.mode-bar .dot.rnd{background:#D2A850}

/* Main */
main{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
main:empty::after{content:'加载中…';display:block;text-align:center;padding:40px;color:#484F58}

/* Task card */
.task-card{
  background:#161B22;border:1px solid #21262D;border-radius:12px;padding:14px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px;
  transition:border-color .2s;
}
.task-card.executing{border-color:#D29922}
.task-card.done{opacity:.5}
.task-info{flex:1;min-width:0}
.task-info .title{font-size:15px;font-weight:600;line-height:1.3}
.task-info .title.done-text{text-decoration:line-through;color:#484F58}
.task-info .meta{font-size:11px;color:#8B949E;margin-top:3px;display:flex;align-items:center;gap:6px}
.task-info .meta .badge{
  display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600;
}
.badge-pending{background:#1A2332;color:#58A6FF}
.badge-executing{background:#2A2210;color:#D29922}
.badge-done{background:#122416;color:#3FB950}

.task-card .task-actions{display:flex;gap:6px;flex-shrink:0}
.task-card .task-actions button{
  width:32px;height:32px;border-radius:50%;border:none;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:#21262D;color:#8B949E;transition:all .15s;
}
.task-card .task-actions button:active{transform:scale(.9)}
.task-card .task-actions .btn-del{color:#F85149}
.task-card .task-actions .btn-del:active{background:#3D1F24}

/* FAB */
.fab{
  position:fixed;bottom:24px;bottom:max(24px,calc(env(safe-area-inset-bottom) + 8px));
  right:20px;width:56px;height:56px;border-radius:50%;
  background:#238636;color:#FFF;border:none;font-size:28px;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:20;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,opacity .2s;
}
.fab:active{transform:scale(.92);opacity:.9}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:#484F58}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}
.empty .hint{font-size:12px;color:#30363D;margin-top:4px}

/* Modal backdrop */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{
  width:100%;max-width:480px;background:#161B22;border:1px solid #30363D;
  border-radius:20px 20px 0 0;padding:20px 16px;
  padding-bottom:max(20px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-sheet h3{font-size:17px;text-align:center;margin-bottom:14px}

.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#8B949E;margin-bottom:4px;font-weight:600}
.form-group input{
  width:100%;padding:12px;background:#0D1117;border:1px solid #30363D;border-radius:10px;
  color:#E6EDF3;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s;
}
.form-group input:focus{border-color:#58A6FF}

.time-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.time-presets button{
  padding:6px 14px;border-radius:16px;border:1px solid #30363D;background:#0D1117;
  color:#8B949E;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.time-presets button:active,.time-presets button.sel{border-color:#58A6FF;color:#58A6FF}

.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions button{
  flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:600;
  cursor:pointer;font-family:inherit;border:none;transition:opacity .2s;
}
.modal-actions button:active{opacity:.8}
.btn-primary{background:#238636;color:#FFF}
.btn-secondary{background:#21262D;color:#C9D1D9}
.btn-danger{background:#DA3633;color:#FFF}

/* Fullscreen reminder */
.reminder-overlay{
  position:fixed;inset:0;background:#0D1117;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px;text-align:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.reminder-overlay.show{opacity:1;pointer-events:auto}
.reminder-overlay .r-icon{font-size:64px;margin-bottom:16px}
.reminder-overlay .r-title{font-size:20px;font-weight:700;margin-bottom:8px;color:#E6EDF3}
.reminder-overlay .r-task{font-size:24px;font-weight:800;color:#58A6FF;margin-bottom:6px}
.reminder-overlay .r-sub{font-size:13px;color:#8B949E;margin-bottom:24px}
.reminder-overlay .r-actions{display:flex;gap:10px;width:100%;max-width:320px}
.reminder-overlay .r-actions button{
  flex:1;padding:14px;border-radius:12px;font-size:16px;font-weight:700;
  cursor:pointer;font-family:inherit;border:none;transition:opacity .2s;
}
.reminder-overlay .r-actions button:active{opacity:.8}
.reminder-overlay .r-actions.stack{flex-direction:column}
.reminder-overlay .r-input-row{display:flex;gap:8px;align-items:center;margin-top:12px;width:100%;max-width:320px}
.reminder-overlay .r-input-row input{
  flex:1;padding:12px;background:#161B22;border:1px solid #30363D;border-radius:10px;
  color:#E6EDF3;font-size:18px;text-align:center;font-family:inherit;outline:none;
}
.reminder-overlay .r-input-row button{
  padding:12px 18px;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;border:none;background:#238636;color:#FFF;
}

/* Settings */
.setting-row{
  display:flex;align-items:center;justify-content:space-between;padding:12px 0;
}
.setting-row .s-label{font-size:14px;color:#C9D1D9}
.setting-row .s-hint{font-size:11px;color:#8B949E;margin-top:2px}
.toggle{
  width:48px;height:28px;border-radius:14px;background:#30363D;
  cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
}
.toggle.on{background:#238636}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;
  border-radius:50%;background:#FFF;transition:left .2s;
}
.toggle.on::after{left:23px}

.sync-status{font-size:11px;padding:4px 8px;border-radius:8px;display:inline-block}
.sync-ok{background:#122416;color:#3FB950}
.sync-err{background:#3D1F24;color:#F85149}
.sync-off{background:#1A1A1A;color:#484F58}

/* Toast */
#toast{
  position:fixed;top:20px;top:max(20px,env(safe-area-inset-top));left:50%;
  transform:translateX(-50%) translateY(-120px);
  background:#C9D1D9;color:#0D1117;padding:10px 20px;border-radius:20px;
  font-size:14px;font-weight:600;z-index:300;pointer-events:none;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;max-width:90vw;text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>⏰ 任务提醒</h1>
    <button class="btn-settings" onclick="openSettings()" title="设置">⚙️</button>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="num" id="statPending">0</div><div class="label">待执行</div></div>
    <div class="stat"><div class="num" id="statExecuting" style="color:#D29922">0</div><div class="label">进行中</div></div>
    <div class="stat"><div class="num done" id="statDone">0</div><div class="label">已完成</div></div>
  </div>
  <div class="mode-bar">
    <span class="dot" id="modeDot"></span>
    <span id="modeLabel">顺序模式</span>
  </div>
  <main id="content"></main>
  <button class="fab" onclick="openAddModal()" title="添加任务">＋</button>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-sheet">
    <h3>📝 添加任务</h3>
    <div class="form-group">
      <label>任务名称</label>
      <input type="text" id="taskTitle" placeholder="输入任务内容…" maxlength="50">
    </div>
    <label style="font-size:12px;color:#8B949E;font-weight:600;margin-bottom:6px;display:block">预计完成时间</label>
    <div class="time-presets" id="timePresets">
      <button onclick="selectTime(5)">5 分钟</button>
      <button onclick="selectTime(10)">10 分钟</button>
      <button onclick="selectTime(15)">15 分钟</button>
      <button onclick="selectTime(30)">30 分钟</button>
      <button onclick="selectTime(45)">45 分钟</button>
      <button onclick="selectTime(60)">60 分钟</button>
    </div>
    <div class="form-group">
      <label>自定义（分钟）</label>
      <input type="number" id="taskTime" inputmode="numeric" min="1" max="480" value="15" placeholder="分钟数">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeAddModal()">取消</button>
      <button class="btn-primary" onclick="addTask()">添加任务</button>
    </div>
  </div>
</div>

<!-- Reminder Overlay (fullscreen, cannot be ignored) -->
<div class="reminder-overlay" id="reminder">
  <div class="r-icon" id="reminderIcon">📋</div>
  <div class="r-title" id="reminderTitle"></div>
  <div class="r-task" id="reminderTask"></div>
  <div class="r-sub" id="reminderSub"></div>
  <div class="r-actions" id="reminderActions"></div>
  <div class="r-input-row" id="reminderInput" style="display:none"></div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-sheet">
    <h3>⚙️ 设置</h3>
    <div class="setting-row">
      <div>
        <div class="s-label">弹窗模式</div>
        <div class="s-hint" id="modeHint">按添加顺序依次弹出</div>
      </div>
      <div class="toggle on" id="modeToggle" onclick="toggleMode()"></div>
    </div>
    <div class="form-group" style="margin-top:12px">
      <label>多设备同步 Token</label>
      <input type="password" id="syncToken" placeholder="粘贴 GitHub Token…" style="font-size:13px">
      <div class="s-hint" style="margin-top:4px">在 GitHub Settings → Developer settings → Personal access tokens 创建，勾选 repo 权限。留空则不同步。</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
      <span style="font-size:12px;color:#8B949E">同步状态：</span>
      <span class="sync-status sync-off" id="syncStatus">未启用</span>
      <button class="btn-secondary" style="padding:4px 10px;font-size:11px;flex:none" onclick="forceSync()">🔄 立即同步</button>
    </div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-primary" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ==================== DATA ====================
const STORAGE_KEY = 'tasker-data';
const SYNC_FILE = 'tasker-data.json';
const RAW_URL = 'https://raw.githubusercontent.com/LUCKoxo/my-warehouse/main/' + SYNC_FILE;
const API_URL = 'https://api.github.com/repos/LUCKoxo/my-warehouse/contents/' + SYNC_FILE;

function getDefaultData() {
  return {
    tasks: [],
    settings: { mode: 'sequential', githubToken: '' },
    lastSync: null
  };
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return getDefaultData();
    const data = JSON.parse(raw);
    if (!data.tasks) data.tasks = [];
    if (!data.settings) data.settings = { mode: 'sequential', githubToken: '' };
    return data;
  } catch(e) { return getDefaultData(); }
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { toast('⚠️ 存储空间不足'); }
}

let APP = loadData();

// ==================== SYNC ====================
async function syncFromRemote() {
  const token = APP.settings.githubToken;
  if (!token) return;
  try {
    const resp = await fetch(RAW_URL + '?t=' + Date.now());
    if (!resp.ok) return;
    const remote = await resp.json();
    if (!remote.tasks) return;

    // 合并：本地和远程各取最新的
    const merged = new Map();
    APP.tasks.forEach(t => merged.set(t.id, t));
    remote.tasks.forEach(t => {
      const local = merged.get(t.id);
      if (!local || new Date(t.createdAt) > new Date(local.createdAt)) {
        merged.set(t.id, t);
      }
    });

    APP.tasks = Array.from(merged.values());
    APP.lastSync = new Date().toISOString();
    saveData(APP);
    renderContent();
    updateSyncStatus('ok');
  } catch(e) { updateSyncStatus('err'); }
}

async function syncToRemote() {
  const token = APP.settings.githubToken;
  if (!token) return;
  try {
    // 获取当前远程文件 SHA
    let sha = null;
    try {
      const getResp = await fetch(API_URL, {
        headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }
      });
      if (getResp.ok) {
        const info = await getResp.json();
        sha = info.sha;
      }
    } catch(e) {}

    const payload = {
      message: '🔄 同步任务数据',
      content: btoa(unescape(encodeURIComponent(JSON.stringify({ tasks: APP.tasks, lastSync: new Date().toISOString() })))
    };
    if (sha) payload.sha = sha;

    await fetch(API_URL, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });
    APP.lastSync = new Date().toISOString();
    saveData(APP);
    updateSyncStatus('ok');
  } catch(e) { updateSyncStatus('err'); }
}

async function forceSync() {
  toast('🔄 同步中…');
  await syncFromRemote();
  await syncToRemote();
  toast('✅ 同步完成');
}

function updateSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (!APP.settings.githubToken) {
    el.textContent = '未启用'; el.className = 'sync-status sync-off';
  } else if (status === 'ok') {
    const time = APP.lastSync ? new Date(APP.lastSync).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) : '';
    el.textContent = '已同步' + (time ? ' ' + time : '');
    el.className = 'sync-status sync-ok';
  } else {
    el.textContent = '同步失败'; el.className = 'sync-status sync-err';
  }
}

// 定时拉取
setInterval(() => { if (APP.settings.githubToken) syncFromRemote(); }, 30000);

// ==================== REMINDER ENGINE ====================
let reminderCheckInterval = null;
let currentReminderTaskId = null;

function startReminderEngine() {
  if (reminderCheckInterval) clearInterval(reminderCheckInterval);
  reminderCheckInterval = setInterval(checkReminders, 15000);
  checkReminders(); // immediate check
}

function checkReminders() {
  if (currentReminderTaskId) return; // already showing a reminder

  // 1. 检查是否有在执行中的任务到时间了
  const executing = APP.tasks.find(t => t.status === 'executing' && t.remindAt && new Date(t.remindAt) <= new Date());
  if (executing) {
    showCompleteReminder(executing);
    return;
  }

  // 2. 如果没有执行中的任务，选下一个 pending 任务
  if (!APP.tasks.find(t => t.status === 'executing')) {
    const next = pickNextTask();
    if (next) {
      showStartReminder(next);
    }
  }
}

function pickNextTask() {
  const pending = APP.tasks.filter(t => t.status === 'pending');
  if (pending.length === 0) return null;
  if (APP.settings.mode === 'random') {
    return pending[Math.floor(Math.random() * pending.length)];
  }
  // sequential: oldest first
  return pending.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt))[0];
}

// ==================== REMINDER UI ====================
let reminderCallback = null;

function showStartReminder(task) {
  currentReminderTaskId = task.id;
  const ov = document.getElementById('reminder');
  document.getElementById('reminderIcon').textContent = '📋';
  document.getElementById('reminderTitle').textContent = '准备执行任务';
  document.getElementById('reminderTask').textContent = task.title;
  document.getElementById('reminderSub').textContent = '预计 ' + task.estimatedMinutes + ' 分钟';

  const actions = document.getElementById('reminderActions');
  actions.className = 'r-actions';
  actions.innerHTML = `
    <button class="btn-secondary" onclick="dismissReminder('skip')">⏭️ 跳过</button>
    <button class="btn-primary" onclick="dismissReminder('start')">✅ 确认执行</button>
  `;
  document.getElementById('reminderInput').style.display = 'none';
  ov.classList.add('show');

  // 震动
  try { navigator.vibrate([150, 80, 150]); } catch(e) {}
}

function showCompleteReminder(task) {
  currentReminderTaskId = task.id;
  const ov = document.getElementById('reminder');
  document.getElementById('reminderIcon').textContent = '⏰';
  document.getElementById('reminderTitle').textContent = '时间到！';
  document.getElementById('reminderTask').textContent = task.title;

  const elapsed = Math.round((Date.now() - new Date(task.startTime).getTime()) / 60000);
  document.getElementById('reminderSub').textContent = '已经过了 ' + elapsed + ' 分钟，完成了吗？';

  const actions = document.getElementById('reminderActions');
  actions.className = 'r-actions';
  actions.innerHTML = `
    <button class="btn-danger" onclick="dismissReminder('notdone')">❌ 未完成</button>
    <button class="btn-primary" onclick="dismissReminder('done')">✅ 已完成</button>
  `;
  document.getElementById('reminderInput').style.display = 'none';
  ov.classList.add('show');

  // 强震动
  try { navigator.vibrate([200, 100, 200, 100, 300]); } catch(e) {}
}

function showRetryInput(task) {
  document.getElementById('reminderActions').innerHTML = '';
  document.getElementById('reminderActions').className = 'r-actions stack';
  const inputRow = document.getElementById('reminderInput');
  inputRow.style.display = 'flex';
  inputRow.innerHTML = `
    <input type="number" inputmode="numeric" min="1" max="480" value="${task.estimatedMinutes}" id="retryTime" placeholder="分钟">
    <button onclick="dismissReminder('retry')">重新计时</button>
  `;
  setTimeout(() => {
    const inp = document.getElementById('retryTime');
    if (inp) { inp.focus(); inp.select(); }
  }, 200);
}

function dismissReminder(action) {
  const task = APP.tasks.find(t => t.id === currentReminderTaskId);
  if (!task) { closeReminder(); return; }

  switch (action) {
    case 'start':
      task.status = 'executing';
      task.startTime = new Date().toISOString();
      task.remindAt = new Date(Date.now() + task.estimatedMinutes * 60000).toISOString();
      toast('⏳ 开始计时：' + task.title);
      break;
    case 'skip':
      // 放回 pending 队列
      task.status = 'pending';
      break;
    case 'done':
      task.status = 'done';
      task.completedAt = new Date().toISOString();
      task.remindAt = null;
      toast('🎉 已完成：' + task.title);
      break;
    case 'notdone':
      showRetryInput(task);
      return; // 不关闭弹窗，继续等待输入
    case 'retry':
      const newTime = parseInt(document.getElementById('retryTime')?.value) || task.estimatedMinutes;
      task.estimatedMinutes = newTime;
      task.remindAt = new Date(Date.now() + newTime * 60000).toISOString();
      task.status = 'executing';
      toast('⏳ 重新计时 ' + newTime + ' 分钟：' + task.title);
      break;
  }

  closeReminder();
  saveData(APP);
  renderContent();

  // 如果刚完成一个任务，检查是否还有待执行的
  if (action === 'done' && !APP.tasks.find(t => t.status === 'executing')) {
    setTimeout(() => {
      const next = pickNextTask();
      if (next) showStartReminder(next);
      else toast('🎊 全部任务已完成！');
    }, 600);
  }
}

function closeReminder() {
  document.getElementById('reminder').classList.remove('show');
  document.getElementById('reminderActions').innerHTML = '';
  document.getElementById('reminderInput').style.display = 'none';
  currentReminderTaskId = null;
}

// ==================== TASK CRUD ====================
function addTask() {
  const title = document.getElementById('taskTitle').value.trim();
  const time = parseInt(document.getElementById('taskTime').value) || 15;
  if (!title) { toast('请输入任务名称'); return; }
  if (time < 1 || time > 480) { toast('时间范围：1-480 分钟'); return; }

  const task = {
    id: 't' + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    title,
    estimatedMinutes: time,
    status: 'pending',
    startTime: null,
    remindAt: null,
    createdAt: new Date().toISOString(),
    completedAt: null
  };
  APP.tasks.push(task);
  saveData(APP);
  closeAddModal();
  renderContent();
  toast('✅ 已添加：' + title);

  // 如果没有执行中的任务，立即弹出新任务
  if (!APP.tasks.find(t => t.status === 'executing')) {
    setTimeout(() => showStartReminder(task), 400);
  }

  // 同步到远程
  if (APP.settings.githubToken) syncToRemote();
}

function deleteTask(id) {
  const task = APP.tasks.find(t => t.id === id);
  if (!task) return;
  if (currentReminderTaskId === id) closeReminder();
  APP.tasks = APP.tasks.filter(t => t.id !== id);
  saveData(APP);
  renderContent();
  toast('已删除：' + task.title);
  if (APP.settings.githubToken) syncToRemote();
}

function resetTask(id) {
  const task = APP.tasks.find(t => t.id === id);
  if (!task) return;
  task.status = 'pending';
  task.startTime = null;
  task.remindAt = null;
  task.completedAt = null;
  saveData(APP);
  renderContent();
  toast('🔄 已重置：' + task.title);
  if (!APP.tasks.find(t => t.status === 'executing')) {
    setTimeout(() => {
      const next = pickNextTask();
      if (next) showStartReminder(next);
    }, 400);
  }
}

// ==================== MODALS ====================
let selectedTime = 15;

function openAddModal() {
  document.getElementById('taskTitle').value = '';
  selectedTime = 15;
  document.getElementById('taskTime').value = 15;
  updateTimePresets();
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('taskTitle').focus(), 300);
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
}

function selectTime(min) {
  selectedTime = min;
  document.getElementById('taskTime').value = min;
  updateTimePresets();
}

function updateTimePresets() {
  document.querySelectorAll('#timePresets button').forEach(b => {
    const val = parseInt(b.textContent);
    b.className = val === selectedTime ? 'sel' : '';
  });
}

// Watch custom time input
document.addEventListener('DOMContentLoaded', () => {
  const timeInput = document.getElementById('taskTime');
  if (timeInput) {
    timeInput.addEventListener('input', () => {
      selectedTime = parseInt(timeInput.value) || 15;
      updateTimePresets();
    });
  }
});

function openSettings() {
  document.getElementById('modeToggle').className = 'toggle' + (APP.settings.mode === 'sequential' ? ' on' : '');
  document.getElementById('modeHint').textContent = APP.settings.mode === 'sequential' ? '按添加顺序依次弹出' : '随机抽取任务弹出';
  document.getElementById('syncToken').value = APP.settings.githubToken || '';
  document.getElementById('settingsModal').classList.add('show');
  updateSyncStatus(APP.settings.githubToken ? 'ok' : null);
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}

function toggleMode() {
  APP.settings.mode = APP.settings.mode === 'sequential' ? 'random' : 'sequential';
  document.getElementById('modeToggle').className = 'toggle' + (APP.settings.mode === 'sequential' ? ' on' : '');
  document.getElementById('modeHint').textContent = APP.settings.mode === 'sequential' ? '按添加顺序依次弹出' : '随机抽取任务弹出';
  saveData(APP);
  updateModeBar();
}

function saveSettings() {
  const token = document.getElementById('syncToken').value.trim();
  APP.settings.githubToken = token;
  saveData(APP);
  closeSettings();
  if (token) {
    toast('✅ 设置已保存，正在同步…');
    syncFromRemote().then(() => syncToRemote());
  } else {
    toast('✅ 设置已保存（本地模式）');
    updateSyncStatus(null);
  }
}

// ==================== RENDER ====================
function renderContent() {
  const main = document.getElementById('content');
  const tasks = APP.tasks;

  if (tasks.length === 0) {
    main.innerHTML = `<div class="empty">
      <div class="icon">📭</div>
      <p>还没有任务</p>
      <p class="hint">点击右下角 ＋ 添加第一个任务吧</p>
    </div>`;
  } else {
    // 排序：executing > pending > done，每组内按时间倒序
    const order = { executing: 0, pending: 1, done: 2 };
    const sorted = [...tasks].sort((a,b) => {
      if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
    main.innerHTML = sorted.map(t => renderTaskCard(t)).join('');
  }
  renderStats();
  updateModeBar();
}

function renderTaskCard(task) {
  const badgeMap = {
    pending: 'badge-pending',
    executing: 'badge-executing',
    done: 'badge-done'
  };
  const statusText = { pending: '待执行', executing: '执行中', done: '已完成' };
  const doneClass = task.status === 'done' ? ' done-text' : '';
  const cardClass = task.status === 'executing' ? ' executing' : (task.status === 'done' ? ' done' : '');

  let metaHTML = `<span class="badge ${badgeMap[task.status]}">${statusText[task.status]}</span>`;
  metaHTML += ` · ⏱ ${task.estimatedMinutes} 分钟`;
  if (task.status === 'executing' && task.startTime) {
    const elapsed = Math.round((Date.now() - new Date(task.startTime).getTime()) / 60000);
    metaHTML += ` · 已过 ${elapsed} 分`;
  }

  let actionsHTML = '';
  if (task.status === 'done') {
    actionsHTML = `<button onclick="resetTask('${task.id}')" title="重做">🔄</button>`;
  }
  actionsHTML += `<button class="btn-del" onclick="deleteTask('${task.id}')" title="删除">✕</button>`;

  return `
    <div class="task-card${cardClass}">
      <div class="task-info">
        <div class="title${doneClass}">${esc(task.title)}</div>
        <div class="meta">${metaHTML}</div>
      </div>
      <div class="task-actions">${actionsHTML}</div>
    </div>
  `;
}

function renderStats() {
  const pending = APP.tasks.filter(t => t.status === 'pending').length;
  const executing = APP.tasks.filter(t => t.status === 'executing').length;
  const done = APP.tasks.filter(t => t.status === 'done').length;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statExecuting').textContent = executing;
  document.getElementById('statDone').textContent = done;
}

function updateModeBar() {
  const dot = document.getElementById('modeDot');
  const label = document.getElementById('modeLabel');
  if (APP.settings.mode === 'sequential') {
    dot.className = 'dot seq';
    label.textContent = '顺序模式';
  } else {
    dot.className = 'dot rnd';
    label.textContent = '随机模式';
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ==================== TOAST ====================
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ==================== BACKDROP CLICKS ====================
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});
document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

// ==================== VISIBILITY CHANGE ====================
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    checkReminders();
    if (APP.settings.githubToken) syncFromRemote();
  }
});

// ==================== PWA INIT ====================
(function initPWA() {
  const canvas = document.createElement('canvas');
  canvas.width = 192; canvas.height = 192;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0D1117';
  ctx.beginPath(); ctx.roundRect(0,0,192,192,36); ctx.fill();
  ctx.fillStyle = '#58A6FF';
  ctx.beginPath(); ctx.arc(96,80,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0D1117';
  ctx.beginPath(); ctx.arc(96,80,22,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#58A6FF';
  ctx.fillRect(92,78,8,36);
  ctx.fillRect(78,76,8,20);
  ctx.fillRect(106,76,8,20);
  const iconURL = canvas.toDataURL('image/png');

  const manifest = {
    name: '任务提醒',
    short_name: '任务',
    start_url: './',
    scope: './',
    display: 'standalone',
    background_color: '#0D1117',
    theme_color: '#0D1117',
    icons: [{ src: iconURL, sizes: '192x192', type: 'image/png', purpose: 'any maskable' }]
  };
  const bytes = new TextEncoder().encode(JSON.stringify(manifest));
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  document.getElementById('manifest').href = 'data:application/manifest+json;base64,' + btoa(binary);
  console.log('⏰ 任务提醒 PWA 已就绪');
})();

// ==================== STARTUP ====================
renderContent();
startReminderEngine();
if (APP.settings.githubToken) {
  syncFromRemote().then(() => {
    renderContent();
    setTimeout(checkReminders, 1000);
  });
}

console.log('⏰ 任务提醒 — 已就绪');
console.log('   任务数:', APP.tasks.length);
console.log('   模式:', APP.settings.mode === 'sequential' ? '顺序' : '随机');
console.log('   同步:', APP.settings.githubToken ? '已启用' : '未启用');
</script>
</body>
